<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SysMon — System Resource Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d0f12;
    --bg2:     #13161a;
    --bg3:     #1a1e24;
    --border:  #252a32;
    --border2: #2e3540;
    --green:   #3dd68c;
    --green2:  #1a6b45;
    --yellow:  #e5c07b;
    --red:     #f47067;
    --blue:    #61afef;
    --cyan:    #56b6c2;
    --gray:    #5c6370;
    --text:    #abb2bf;
    --dim:     #4b5263;
    --white:   #dde1e8;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', system-ui, sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; -webkit-font-smoothing: antialiased; }

  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .logo { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--green); display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .header-right { display: flex; align-items: center; gap: 16px; }
  .uptime-badge { font-family: var(--mono); font-size: 11px; color: var(--gray); }
  .refresh-btn {
    font-family: var(--mono); font-size: 11px; color: var(--text);
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 5px; padding: 4px 10px; cursor: pointer;
    transition: border-color .15s;
  }
  .refresh-btn:hover { border-color: var(--green2); color: var(--green); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .card {
    background: var(--bg);
    padding: 18px 20px;
  }

  .card-title {
    font-family: var(--mono); font-size: 10px; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase; color: var(--gray);
    margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
  }

  /* ── big stat ── */
  .big-stat { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 10px; }
  .big-val { font-family: var(--mono); font-size: 36px; font-weight: 600; line-height: 1; color: var(--white); }
  .big-unit { font-family: var(--mono); font-size: 14px; color: var(--gray); padding-bottom: 4px; }
  .big-sub { font-family: var(--mono); font-size: 11px; color: var(--gray); margin-bottom: 10px; }

  /* ── gauge bar ── */
  .gauge-track { height: 4px; background: var(--border2); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
  .gauge-fill { height: 4px; border-radius: 2px; transition: width .6s ease, background .3s; }

  /* ── sparkline ── */
  .sparkline { width: 100%; height: 48px; }

  /* ── metric rows ── */
  .metric-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .metric-row:last-child { border-bottom: none; }
  .metric-label { font-family: var(--mono); font-size: 12px; color: var(--gray); }
  .metric-val { font-family: var(--mono); font-size: 12px; color: var(--white); }
  .metric-bar-wrap { flex: 1; margin: 0 10px; height: 3px; background: var(--border2); border-radius: 2px; }
  .metric-bar { height: 3px; border-radius: 2px; transition: width .4s ease; }

  /* ── process table ── */
  .proc-table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 11px; }
  .proc-table th { color: var(--dim); text-align: left; padding: 0 0 8px; font-weight: 400; text-transform: uppercase; letter-spacing: .06em; font-size: 10px; }
  .proc-table td { padding: 5px 0; border-top: 1px solid var(--border); color: var(--text); }
  .proc-table td:last-child { text-align: right; color: var(--cyan); }
  .proc-name { color: var(--white); }
  .proc-pid { color: var(--dim); }

  /* ── net card ── */
  .net-iface { margin-bottom: 12px; }
  .net-iface:last-child { margin-bottom: 0; }
  .net-name { font-family: var(--mono); font-size: 12px; color: var(--white); margin-bottom: 6px; }
  .net-stats { display: flex; gap: 20px; }
  .net-dir { font-family: var(--mono); font-size: 11px; }
  .net-speed { font-size: 14px; font-weight: 500; }

  /* ── disk row ── */
  .disk-item { margin-bottom: 12px; }
  .disk-item:last-child { margin-bottom: 0; }
  .disk-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .disk-mount { font-family: var(--mono); font-size: 12px; color: var(--white); }
  .disk-usage { font-family: var(--mono); font-size: 11px; color: var(--gray); }

  /* ── load ── */
  .load-pills { display: flex; gap: 8px; }
  .load-pill { background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; padding: 8px 12px; flex: 1; text-align: center; }
  .load-pill-val { font-family: var(--mono); font-size: 18px; font-weight: 500; color: var(--white); }
  .load-pill-lbl { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 2px; }

  /* ── status bar ── */
  .status-bar {
    padding: 8px 24px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    font-family: var(--mono); font-size: 11px; color: var(--dim);
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }

  /* ── alerts ── */
  .alert-banner {
    margin: 0; padding: 10px 24px;
    background: rgba(244,112,103,.08);
    border-bottom: 1px solid rgba(244,112,103,.2);
    font-family: var(--mono); font-size: 12px; color: var(--red);
    display: none;
  }

  /* ── cpu cores grid ── */
  .cores-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 6px; }
  .core-cell { background: var(--bg3); border: 1px solid var(--border2); border-radius: 5px; padding: 6px 8px; }
  .core-num { font-family: var(--mono); font-size: 10px; color: var(--dim); }
  .core-val { font-family: var(--mono); font-size: 14px; font-weight: 500; }
  .core-bar { margin-top: 4px; height: 2px; background: var(--border2); border-radius: 1px; }
  .core-bar-fill { height: 2px; border-radius: 1px; transition: width .5s ease; }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>sysmon</div>
  <div class="header-right">
    <span class="uptime-badge" id="uptime-badge">uptime —</span>
    <button class="refresh-btn" onclick="refresh()">⟳ refresh</button>
  </div>
</header>

<div class="alert-banner" id="alert-banner"></div>

<!-- Row 1: CPU + Memory + Uptime/Load -->
<div class="grid">

  <!-- CPU overall -->
  <div class="card">
    <div class="card-title"><i>⬡</i> CPU</div>
    <div class="big-stat">
      <div class="big-val" id="cpu-val">—</div>
      <div class="big-unit">%</div>
    </div>
    <div class="big-sub" id="cpu-sub">measuring…</div>
    <div class="gauge-track"><div class="gauge-fill" id="cpu-bar" style="width:0%"></div></div>
    <svg class="sparkline" id="cpu-spark" viewBox="0 0 300 48" preserveAspectRatio="none"></svg>
  </div>

  <!-- Memory -->
  <div class="card">
    <div class="card-title"><i>▤</i> Memory</div>
    <div class="big-stat">
      <div class="big-val" id="mem-val">—</div>
      <div class="big-unit" id="mem-unit">GB</div>
    </div>
    <div class="big-sub" id="mem-sub">of — GB used</div>
    <div class="gauge-track"><div class="gauge-fill" id="mem-bar" style="width:0%"></div></div>
    <svg class="sparkline" id="mem-spark" viewBox="0 0 300 48" preserveAspectRatio="none"></svg>
  </div>

  <!-- Load average -->
  <div class="card">
    <div class="card-title"><i>◈</i> Load average</div>
    <div class="load-pills" style="margin-bottom:14px">
      <div class="load-pill"><div class="load-pill-val" id="load1">—</div><div class="load-pill-lbl">1 min</div></div>
      <div class="load-pill"><div class="load-pill-val" id="load5">—</div><div class="load-pill-lbl">5 min</div></div>
      <div class="load-pill"><div class="load-pill-val" id="load15">—</div><div class="load-pill-lbl">15 min</div></div>
    </div>
    <div class="card-title" style="margin-top:10px"><i>◷</i> System info</div>
    <div class="metric-row"><span class="metric-label">platform</span><span class="metric-val" id="info-platform">—</span></div>
    <div class="metric-row"><span class="metric-label">cores</span><span class="metric-val" id="info-cores">—</span></div>
    <div class="metric-row"><span class="metric-label">last updated</span><span class="metric-val" id="info-time">—</span></div>
  </div>

</div>

<!-- Row 2: Disk + Network + Processes -->
<div class="grid">

  <!-- Disk -->
  <div class="card">
    <div class="card-title"><i>◫</i> Disk</div>
    <div id="disk-content"><div style="color:var(--dim);font-family:var(--mono);font-size:12px">loading…</div></div>
  </div>

  <!-- Network -->
  <div class="card">
    <div class="card-title"><i>⇅</i> Network</div>
    <div id="net-content"><div style="color:var(--dim);font-family:var(--mono);font-size:12px">loading…</div></div>
  </div>

  <!-- Top processes -->
  <div class="card">
    <div class="card-title"><i>≡</i> Top processes</div>
    <table class="proc-table">
      <thead><tr><th>PID</th><th>Name</th><th style="text-align:right">RAM</th></tr></thead>
      <tbody id="proc-tbody"></tbody>
    </table>
  </div>

</div>

<!-- Row 3: CPU cores -->
<div class="grid">
  <div class="card" style="grid-column: 1 / -1">
    <div class="card-title"><i>⬡</i> CPU cores</div>
    <div class="cores-grid" id="cores-grid"></div>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot"></div>
  <span id="status-text">initialising…</span>
  <span style="margin-left:auto" id="tick-count">0 updates</span>
</div>

<script>
// ── simulated live data engine ─────────────────────────────────────────────
// Browsers can't read /proc directly. We simulate realistic metrics that
// drift and fluctuate like a real system. For real data, run sysmon.py CLI.

const NUM_CORES = Math.max(2, navigator.hardwareConcurrency || 4);
const HISTORY_LEN = 60;

let ticks = 0;
let history = { cpu: [], mem: [] };
let prevNet = null;

function rand(min, max) { return Math.random() * (max - min) + min; }

function smoothRand(prev, min, max, step=5) {
  let next = prev + rand(-step, step);
  return Math.max(min, Math.min(max, next));
}

// simulate realistic state
let state = {
  cpu:    rand(10, 40),
  mem:    rand(30, 60),
  cores:  Array.from({length: NUM_CORES}, () => rand(5, 50)),
  load1:  rand(0.3, 1.5),
  load5:  rand(0.3, 1.2),
  load15: rand(0.2, 1.0),
  disk: [
    { mount: '/', total: 256*1e9, used: rand(80,150)*1e9 },
    { mount: '/home', total: 512*1e9, used: rand(100,300)*1e9 },
  ],
  net: { eth0: { rx: 0, tx: 0, rxRate: rand(10,500)*1024, txRate: rand(5,200)*1024 } },
  procs: [
    'chrome','node','python3','dockerd','postgres','nginx','redis','vscode','bash','systemd'
  ].map((n,i) => ({ pid: 1000+i*137, name: n, rss: rand(50,800)*1024*1024 })),
  uptime: rand(3600, 86400*7),
};

function tick() {
  ticks++;
  state.uptime += 2;

  // drift CPU
  state.cpu = smoothRand(state.cpu, 2, 95, 8);
  state.cores = state.cores.map(c => smoothRand(c, 1, 98, 12));
  // drift MEM
  state.mem = smoothRand(state.mem, 20, 88, 3);
  // drift load
  state.load1  = Math.max(0.01, +(smoothRand(state.load1*100,  5, 400, 15)/100).toFixed(2));
  state.load5  = Math.max(0.01, +(smoothRand(state.load5*100,  5, 300, 8)/100).toFixed(2));
  state.load15 = Math.max(0.01, +(smoothRand(state.load15*100, 5, 250, 5)/100).toFixed(2));
  // drift net
  state.net.eth0.rxRate = smoothRand(state.net.eth0.rxRate/1024, 0, 5000, 300)*1024;
  state.net.eth0.txRate = smoothRand(state.net.eth0.txRate/1024, 0, 2000, 150)*1024;
  state.net.eth0.rx += state.net.eth0.rxRate * 2;
  state.net.eth0.tx += state.net.eth0.txRate * 2;
  // drift procs RAM
  state.procs = state.procs.map(p => ({...p, rss: Math.max(1e6, p.rss + rand(-2,2)*1e6)}));
  state.procs.sort((a,b)=>b.rss-a.rss);

  // push history
  history.cpu.push(state.cpu);
  history.mem.push(state.mem);
  if (history.cpu.length > HISTORY_LEN) history.cpu.shift();
  if (history.mem.length > HISTORY_LEN) history.mem.shift();

  render();
}

// ── helpers ────────────────────────────────────────────────────────────────
function fmtBytes(b, decimals=1) {
  if (b < 1024) return b.toFixed(0)+' B';
  if (b < 1024**2) return (b/1024).toFixed(decimals)+' KB';
  if (b < 1024**3) return (b/1024**2).toFixed(decimals)+' MB';
  if (b < 1024**4) return (b/1024**3).toFixed(decimals)+' GB';
  return (b/1024**4).toFixed(decimals)+' TB';
}

function gaugeColor(pct, warn=70, crit=90) {
  if (pct >= crit) return 'var(--red)';
  if (pct >= warn) return 'var(--yellow)';
  return 'var(--green)';
}

function fmtUptime(s) {
  const d = Math.floor(s/86400), h = Math.floor((s%86400)/3600),
        m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
  if (d) return `${d}d ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m`;
  return `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(sec).padStart(2,'0')}s`;
}

function sparkPath(data, w=300, h=48) {
  if (data.length < 2) return '';
  const max = 100, min = 0;
  const xs = data.map((_,i) => (i/(data.length-1))*w);
  const ys = data.map(v => h - ((v-min)/(max-min))*(h-4) - 2);
  let d = `M${xs[0]},${ys[0]}`;
  for (let i=1;i<xs.length;i++) {
    const cx = (xs[i-1]+xs[i])/2;
    d += ` C${cx},${ys[i-1]} ${cx},${ys[i]} ${xs[i]},${ys[i]}`;
  }
  return d;
}

function updateSpark(id, data, color) {
  const svg = document.getElementById(id);
  if (!svg) return;
  const path = sparkPath(data);
  const areaPath = path ? path+` L300,48 L0,48 Z` : '';
  svg.innerHTML = `
    <defs>
      <linearGradient id="g${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <path d="${areaPath}" fill="url(#g${id})" />
    <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
  `;
}

// ── render ─────────────────────────────────────────────────────────────────
function render() {
  const s = state;
  const cpuPct = Math.round(s.cpu);
  const memPct = Math.round(s.mem);
  const memGB  = (8 * s.mem / 100).toFixed(1);  // simulate 8GB system

  // CPU
  document.getElementById('cpu-val').textContent = cpuPct;
  document.getElementById('cpu-val').style.color = gaugeColor(cpuPct);
  document.getElementById('cpu-sub').textContent = `${NUM_CORES} core${NUM_CORES>1?'s':''} · ${cpuPct < 30 ? 'low load' : cpuPct < 70 ? 'moderate' : 'high load'}`;
  const cpuBar = document.getElementById('cpu-bar');
  cpuBar.style.width = cpuPct+'%';
  cpuBar.style.background = gaugeColor(cpuPct);

  // MEM
  document.getElementById('mem-val').textContent = memGB;
  document.getElementById('mem-sub').textContent = `${memPct}% of 8.0 GB used`;
  const memBar = document.getElementById('mem-bar');
  memBar.style.width = memPct+'%';
  memBar.style.background = gaugeColor(memPct);

  // sparklines
  updateSpark('cpu-spark', history.cpu, gaugeColor(cpuPct));
  updateSpark('mem-spark', history.mem, gaugeColor(memPct));

  // load
  document.getElementById('load1').textContent  = s.load1.toFixed(2);
  document.getElementById('load5').textContent  = s.load5.toFixed(2);
  document.getElementById('load15').textContent = s.load15.toFixed(2);

  // system info
  document.getElementById('info-platform').textContent = navigator.platform || 'Linux x86_64';
  document.getElementById('info-cores').textContent    = NUM_CORES + ' logical';
  document.getElementById('info-time').textContent     = new Date().toLocaleTimeString();
  document.getElementById('uptime-badge').textContent  = 'uptime ' + fmtUptime(s.uptime);

  // disks
  let diskHtml = '';
  for (const d of s.disk) {
    const pct = Math.round(d.used/d.total*100);
    const c = gaugeColor(pct, 75, 90);
    diskHtml += `
      <div class="disk-item">
        <div class="disk-header">
          <span class="disk-mount">${d.mount}</span>
          <span class="disk-usage">${fmtBytes(d.used)} / ${fmtBytes(d.total)}</span>
        </div>
        <div class="gauge-track"><div class="gauge-fill" style="width:${pct}%;background:${c}"></div></div>
        <div style="font-family:var(--mono);font-size:10px;color:${c};margin-top:3px">${pct}%</div>
      </div>`;
  }
  document.getElementById('disk-content').innerHTML = diskHtml;

  // network
  let netHtml = '';
  for (const [iface, n] of Object.entries(s.net)) {
    netHtml += `
      <div class="net-iface">
        <div class="net-name">${iface}</div>
        <div class="net-stats">
          <div class="net-dir"><div style="color:var(--green);font-size:10px">↓ RX</div><div class="net-speed" style="color:var(--green)">${fmtBytes(n.rxRate)}/s</div></div>
          <div class="net-dir"><div style="color:var(--blue);font-size:10px">↑ TX</div><div class="net-speed" style="color:var(--blue)">${fmtBytes(n.txRate)}/s</div></div>
          <div class="net-dir" style="margin-left:auto;text-align:right">
            <div style="color:var(--dim);font-size:10px">total rx</div>
            <div style="font-family:var(--mono);font-size:11px;color:var(--gray)">${fmtBytes(n.rx)}</div>
          </div>
        </div>
      </div>`;
  }
  document.getElementById('net-content').innerHTML = netHtml;

  // processes
  let procHtml = '';
  for (const p of s.procs.slice(0,6)) {
    procHtml += `<tr>
      <td class="proc-pid">${p.pid}</td>
      <td class="proc-name">${p.name}</td>
      <td>${fmtBytes(p.rss)}</td>
    </tr>`;
  }
  document.getElementById('proc-tbody').innerHTML = procHtml;

  // CPU cores
  let coresHtml = '';
  for (let i=0; i<s.cores.length; i++) {
    const pct = Math.round(s.cores[i]);
    const c = gaugeColor(pct);
    coresHtml += `
      <div class="core-cell">
        <div class="core-num">cpu${i}</div>
        <div class="core-val" style="color:${c}">${pct}%</div>
        <div class="core-bar"><div class="core-bar-fill" style="width:${pct}%;background:${c}"></div></div>
      </div>`;
  }
  document.getElementById('cores-grid').innerHTML = coresHtml;

  // alerts
  const alerts = [];
  if (cpuPct >= 90) alerts.push(`CPU critical: ${cpuPct}%`);
  if (memPct >= 90) alerts.push(`RAM critical: ${memPct}%`);
  for (const d of s.disk) {
    const pct = Math.round(d.used/d.total*100);
    if (pct >= 90) alerts.push(`Disk ${d.mount} critical: ${pct}%`);
  }
  const banner = document.getElementById('alert-banner');
  if (alerts.length) {
    banner.style.display = 'block';
    banner.textContent = '⚠ ' + alerts.join('  ·  ');
  } else {
    banner.style.display = 'none';
  }

  // status
  document.getElementById('status-text').textContent = `live · refreshes every 2s · simulated data (run sysmon.py for real metrics)`;
  document.getElementById('tick-count').textContent = `${ticks} updates`;
}

function refresh() { tick(); }

// seed history
for (let i=0; i<20; i++) {
  history.cpu.push(rand(10,50));
  history.mem.push(rand(30,60));
}

// start loop
tick();
setInterval(tick, 2000);
</script>
</body>
</html>
